id: agent-wallet
title: "Agent Wallet"
version: 0.1.0.0
release-notes: "Initial release."
license: MIT
wrapper-repo: "https://github.com/paulscode/agent-wallet-startos"
upstream-repo: "https://github.com/paulscode/agent-wallet"
support-site: "https://github.com/paulscode/agent-wallet/issues"
marketing-site: "https://github.com/paulscode/agent-wallet"
build: ["make"]
description:
  short: "A self-custodial Bitcoin & Lightning wallet with an automation API"
  long: "Agent Wallet is a self-custodial Bitcoin and Lightning wallet that connects to your own LND node and exposes a dashboard plus a programmatic API designed for AI agents to initiate payments within configured limits. It integrates with an installed Electrum indexer (Electrs or Fulcrum) and a Mempool explorer, and offers an optional, experimental Anonymize feature. Anyone holding the dashboard password or an issued API key can spend from the connected node up to its limits."
assets:
  license: LICENSE
  icon: icon.png
  instructions: instructions.md
main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    main: /data
    lnd: /mnt/lnd
health-checks:
  web-interface:
    name: Web Interface
    success-message: "The dashboard is ready."
    type: docker
    image: main
    system: false
    entrypoint: health-check.sh
    inject: true
    args: ["web-interface"]
    mounts: {}
    io-format: json
  node-connectivity:
    name: Node Connectivity
    success-message: "LND and the database are reachable."
    type: docker
    image: main
    system: false
    entrypoint: health-check.sh
    inject: true
    args: ["node-connectivity"]
    mounts: {}
    io-format: json
config:
  get:
    type: script
  set:
    type: script
properties:
  type: script
dependencies:
  lnd:
    version: ">=0.14.3 <1.0.0"
    requirement:
      type: "required"
    description: "The Lightning node Agent Wallet connects to and controls."
    config: ~
  electrs:
    version: ">=0.9.0 <1.0.0"
    requirement:
      type: "opt-in"
      how: "Set Indexer to Electrs in the config"
    description: "Electrum indexer used for on-chain lookups."
    config: ~
  fulcrum:
    version: ">=1.9.0 <3.0.0"
    requirement:
      type: "opt-in"
      how: "Set Indexer to Fulcrum in the config"
    description: "Electrum indexer used for on-chain lookups."
    config: ~
  mempool:
    version: ">=3.0.0 <4.0.0"
    requirement:
      type: "opt-in"
      how: "Set Mempool Explorer to Mempool (official) in the config"
    description: "Local Mempool explorer queried for fees and chain data."
    config: ~
  mempool-rdts:
    version: ">=3.0.0 <4.0.0"
    requirement:
      type: "opt-in"
      how: "Set Mempool Explorer to Mempool BIP-110 / RDTS in the config"
    description: "BIP-110 / RDTS Mempool explorer queried for fees and chain data."
    config: ~
  elements-electrs:
    version: ">=0.1.0 <1.0.0"
    requirement:
      type: "opt-in"
      how: "Enable the Liquid hop in the Anonymize config"
    description: "Liquid Electrum server, required only when the Liquid hop in Anonymize is enabled."
    config: ~
volumes:
  main:
    type: data
  lnd:
    type: pointer
    package-id: lnd
    volume-id: main
    path: "/"
    readonly: true
interfaces:
  main:
    name: Dashboard
    description: "The Agent Wallet dashboard and API."
    tor-config:
      port-mapping:
        80: "8100"
    lan-config:
      443:
        ssl: true
        internal: 8100
    ui: true
    protocols:
      - tcp
      - http
backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - create
      - /mnt/backup
      - /data
    mounts:
      BACKUP: /mnt/backup
      main: /data
    io-format: yaml
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - restore
      - /mnt/backup
      - /data
    mounts:
      BACKUP: /mnt/backup
      main: /data
    io-format: yaml
migrations:
  from:
    "*":
      type: script
      args: ["from"]
  to:
    "*":
      type: script
      args: ["to"]
alerts:
  install: |
    Agent Wallet can move real Bitcoin and Lightning funds, and it is designed to let AI agents initiate payments within configured limits. Anyone or anything with the dashboard password — or an issued API key — can spend from the connected LND node up to its rate limits. Treat the dashboard password like a hot-wallet key. The Anonymize feature is experimental. You are responsible for your funds; review the disclaimers before use.
